name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Auto-cancel superseded runs: a new push to the same PR cancels the prior
# in-flight run instead of letting both burn Actions minutes (private repos
# are billed). Without this, rapid successive pushes pile up concurrent runs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv tool install ruff
      - run: ruff check .
      - run: ruff format --check .

  uv-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - name: Discover uv projects, run mypy + pytest
        shell: bash
        run: |
          set -uo pipefail
          # Layout-agnostic: find every uv project (a dir with pyproject.toml
          # that has a uv.lock or a [tool.uv] table), then per project run
          # mypy (non-blocking, matches the lint job's fleet default) and
          # pytest (blocking — only if the project actually ships tests).
          mapfile -t roots < <(
            find . \( -path '*/.venv' -o -path '*/node_modules' -o -path './.git' \) -prune \
              -o -name pyproject.toml -print | xargs -r -n1 dirname | sort -u
          )
          ran=0 fail=0
          for d in "${roots[@]}"; do
            if [ ! -f "$d/uv.lock" ] && ! grep -q '\[tool\.uv\]' "$d/pyproject.toml" 2>/dev/null; then
              echo "skip $d (not a uv project)"; continue
            fi
            ran=1
            echo "::group::$d"
            if ! (
                  set -e
                  cd "$d"
                  # --all-extras so test deps declared as optional-dependencies
                  # (e.g. a `dev` extra carrying pytest-asyncio) are installed;
                  # plain `uv sync` only covers core + default dependency-groups,
                  # which silently drops async-test plugins.
                  uv sync --all-extras
                  uv run --with mypy mypy --ignore-missing-imports --check-untyped-defs . || true
                  if find . -path '*/.venv' -prune -o \( -name 'test_*.py' -o -name '*_test.py' \) -print | grep -q .; then
                    uv run --with pytest pytest -q
                  else
                    echo "no tests in $d — skipping pytest"
                  fi
                ); then
              echo "FAILED: $d"; fail=1
            fi
            echo "::endgroup::"
          done
          [ "$ran" = 1 ] || echo "no uv projects discovered — nothing to test"
          [ "$fail" = 0 ] || { echo "one or more uv projects failed"; exit 1; }

  secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@v3.95.3
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

  sast:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v6
      - run: semgrep ci --config=auto

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      # QEMU + Buildx so multi-arch `platforms:` builds (e.g. linux/arm64) work.
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Test-build Docker images
        shell: bash
        run: |
          set -uo pipefail
          # Layout-agnostic, build-only smoke test. If the repo ships a Compose
          # file, `docker compose build` covers every service; otherwise build
          # each Dockerfile in its own directory. Repos with neither no-op.
          # No secrets, no push — this only proves the images still build.
          shopt -s nullglob
          # Compose `env_file:` / `${VAR:?}` placeholders need a .env to exist.
          # Seed a stub next to each compose file from an example if present,
          # else an empty file (defaults via ${VAR:-...} still apply). CI never
          # holds real secrets — this only lets the build resolve.
          stub_env() {
            local dir="$1"
            [ -f "$dir/.env" ] && return
            for ex in "$dir/.env.example" "$dir/.env.sample"; do
              [ -f "$ex" ] && { cp "$ex" "$dir/.env"; return; }
            done
            : > "$dir/.env"
          }
          compose=( docker-compose.y*ml compose.y*ml */docker-compose.y*ml */compose.y*ml )
          if [ ${#compose[@]} -gt 0 ]; then
            fail=0
            for f in "${compose[@]}"; do
              stub_env "$(dirname "$f")"
              echo "::group::docker compose -f $f build"
              docker compose -f "$f" build || fail=1
              echo "::endgroup::"
            done
            [ "$fail" = 0 ] || { echo "one or more compose builds failed"; exit 1; }
            exit 0
          fi
          mapfile -t dfs < <(
            find . -path ./.git -prune -o \( -name Dockerfile -o -name 'Dockerfile.*' \) -print
          )
          if [ ${#dfs[@]} -eq 0 ]; then
            echo "no Dockerfile or Compose file — nothing to build"
            exit 0
          fi
          fail=0
          for df in "${dfs[@]}"; do
            echo "::group::docker build -f $df $(dirname "$df")"
            docker build -f "$df" "$(dirname "$df")" || fail=1
            echo "::endgroup::"
          done
          [ "$fail" = 0 ] || { echo "one or more docker builds failed"; exit 1; }

  claude-review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          show_full_output: true
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }} --comment'

  # Advisory merge signal in a SEPARATE job: claude-code-action cannot submit
  # formal review verdicts itself (documented restriction), so this job submits
  # one as github-actions[bot] via the default GITHUB_TOKEN. Kept out of the
  # claude-review job so this advisory check reports an independent status,
  # decoupled from the review action's lifecycle.
  #
  # NOT a hard gate — blocking merge needs branch protection, which GitHub gates
  # behind Pro/Team for private repos. Behaviour:
  #   - findings on the latest commit -> REQUEST_CHANGES (red badge)
  #   - none -> dismiss any prior bot REQUEST_CHANGES review (clears the badge)
  # Actions are NOT permitted to APPROVE a PR (422), so the clean path dismisses
  # rather than approves. The signal refreshes on push, not on clicking
  # "Resolve" (thread resolution fires no workflow event).
  #
  # Two finding surfaces are checked, both anchored to the head SHA so the
  # verdict clears on a clean re-push:
  #   1. INLINE review comments on the latest commit (kept for forward-compat).
  #   2. The code-review plugin's TOP-LEVEL (issue) comment. The plugin posts
  #      ONE consolidated comment, NOT inline review comments — so surface 1
  #      alone is always empty and the verdict would falsely pass. A findings
  #      comment embeds full-SHA permalinks to the reviewed commit (the plugin
  #      mandates them) and never contains the clean sentinel "No issues found";
  #      the clean comment is the fixed "No issues found. Checked for bugs and
  #      CLAUDE.md compliance." template with no SHA. Matching on headSha is
  #      what makes the verdict clear after a clean push: stale findings
  #      comments reference the OLD sha and are ignored.
  #
  # NB: claude-code-action fails its own token exchange on any PR that modifies
  # THIS workflow file ("Workflow validation failed ... this is normal ...");
  # that clears once the change is on the default branch and does not affect
  # this job.
  review-verdict:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: claude-review
    if: always()
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Advisory review verdict
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;
            const headSha = context.payload.pull_request.head.sha;
            const short = headSha.slice(0, 7);

            // Surface 1: inline review comments anchored to the latest commit.
            const reviewComments = await github.paginate(
              github.rest.pulls.listReviewComments,
              { owner, repo, pull_number, per_page: 100 },
            );
            const inlineFindings = reviewComments.filter((c) => c.commit_id === headSha);

            // Surface 2: the code-review plugin's single top-level comment.
            // A findings comment references the reviewed commit via full-SHA
            // permalinks and lacks the clean sentinel; match on headSha so a
            // stale findings comment (old sha) is ignored after a clean push.
            const issueComments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number: pull_number, per_page: 100 },
            );
            const summaryFindings = issueComments.filter((c) => {
              const body = c.body || '';
              return /#{1,3}\s*Code review/i.test(body)
                && body.includes(headSha)
                && !body.includes('No issues found');
            });

            const findingsCount = inlineFindings.length + summaryFindings.length;
            if (findingsCount > 0) {
              await github.rest.pulls.createReview({
                owner, repo, pull_number,
                event: 'REQUEST_CHANGES',
                body: `🔴 Code review flagged unaddressed issue(s) on the latest commit (\`${short}\`). Address them and push — this advisory verdict clears once the latest commit reviews clean. (Advisory only: it does not block merge.)`,
              });
              return;
            }
            // Clean: Actions can't APPROVE, so dismiss any prior bot REQUEST_CHANGES review.
            const reviews = await github.paginate(
              github.rest.pulls.listReviews,
              { owner, repo, pull_number, per_page: 100 },
            );
            const stale = reviews.filter(
              (r) => r.state === 'CHANGES_REQUESTED' && r.user?.login === 'github-actions[bot]',
            );
            for (const r of stale) {
              await github.rest.pulls.dismissReview({
                owner, repo, pull_number, review_id: r.id,
                message: `✅ No outstanding review comments on the latest commit (\`${short}\`).`,
              });
            }
